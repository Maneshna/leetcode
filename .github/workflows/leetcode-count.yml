permissions:
  contents: write
name: Update LeetCode Folder Count

on:
  push:
  schedule:
    - cron: "0 0 * * *"  # runs daily

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Count problem folders
        run: |
          count=$(find . -type d \
            -not -path "./.git*" \
            -not -path "." \
            -not -path "./.github*" \
          | wc -l)
          echo "COUNT=$count" >> $GITHUB_ENV

      - name: Update README
        run: |
          sed -i "s/<!--COUNT_START-->.*<!--COUNT_END-->/<!--COUNT_START-->$COUNT<!--COUNT_END-->/" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "Update folder count" || echo "No changes"
          git push
